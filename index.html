<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f1b3d" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="빛꽃수행" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="빛꽃수행" />

    <!-- SNS 공유 -->
    <meta property="og:title" content="빛꽃수행일지" />
    <meta property="og:description" content="증산도 대학생 연합회 수행일지 앱" />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- 파비콘 -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />

    <title>빛꽃수행일지</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&family=Noto+Serif+KR:wght@400;600&display=swap" rel="stylesheet" />

    <!-- 카카오 JS SDK -->
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
      integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
      crossorigin="anonymous"></script>

    <style>
      * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
      html, body { height:100%; }
      body { background:#FFF7ED; font-family:'Noto Sans KR',sans-serif; }
      #root {
        max-width:480px; margin:0 auto; min-height:100vh;
        padding-top:env(safe-area-inset-top);
        padding-bottom:env(safe-area-inset-bottom);
      }

      /* 스플래시 */
      #splash {
        position:fixed; inset:0; z-index:9999;
        background:#0f1b3d;
        display:flex; flex-direction:column;
        align-items:center; justify-content:center; gap:18px;
        transition:opacity 0.5s ease;
      }
      #splash.fade { opacity:0; pointer-events:none; }
      #splash img { width:110px; height:110px; border-radius:24px; }
      #splash h1 { color:#C9A84C; font-size:22px; font-weight:800; font-family:'Noto Serif KR',serif; letter-spacing:2px; }
      #splash p  { color:#8899BB; font-size:13px; }
    </style>
  </head>
  <body>

    <!-- 스플래시 -->
    <div id="splash">
      <img src="/icons/icon-192.png" alt="빛꽃수행" />
      <h1>빛꽃수행일지</h1>
      <p>증산도 대학생 연합회</p>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Service Worker 등록
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
      // 스플래시 fade-out
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) {
            s.classList.add('fade');
            setTimeout(() => s.remove(), 500);
          }
        }, 900);
      });
    </script>
  </body>
</html>
